<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvil Empires - Raiding Calculator | deSharpe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0f1c;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Inter', sans-serif;
            color: #e9eef3;
            padding: 1.5rem;
        }

        .app {
            max-width: 1500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2e3a48;
            padding-bottom: 1.2rem;
        }

        h1 {
            font-size: 1.7rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #e6b86e, #c68e3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        .sub {
            font-size: 0.85rem;
            color: #8f9bb3;
        }

        .search-box {
            background: #1e2436;
            border-radius: 60px;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            backdrop-filter: blur(4px);
            border: 1px solid #334155;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #f0f3fa;
            font-size: 1rem;
            padding: 0.5rem 0;
            width: 220px;
            font-weight: 400;
        }

        .search-box input::placeholder {
            color: #6f7c91;
        }

        .search-box span {
            color: #d4af6a;
            font-size: 1.1rem;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .structures-panel {
            flex: 2;
            min-width: 280px;
            background: #11161f;
            border-radius: 28px;
            border: 1px solid #293544;
            overflow: hidden;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.5);
        }

        .panel-header {
            background: #0f131d;
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #2c3746;
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header span:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .filter-bar {
            padding: 0.8rem 1.2rem;
            background: #0c111a;
            border-bottom: 1px solid #1f2a36;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #1b2533;
            color: #6a7c94;
            border: 1px solid transparent;
            text-transform: lowercase;
        }

        .filter-btn.active-all {
            background: #b87c2e;
            color: #ffffff;
            border-color: #ffd966;
        }

        .filter-btn:not(.active-all).filter-all {
            background: #2a2a2a;
            color: #5a5a6a;
        }

        .filter-btn.active-family { background: #3a8a4a; color: #ffffff; border-color: #6aba7a; }
        .filter-btn.active-defense { background: #5a5aaa; color: #ffffff; border-color: #8a8acc; }
        .filter-btn.active-camp { background: #aa7a3a; color: #ffffff; border-color: #daaa6a; }
        .filter-btn.active-town { background: #7a4aaa; color: #ffffff; border-color: #aa7ada; }
        .filter-btn.active-general { background: #4a8a8a; color: #ffffff; border-color: #7ababa; }
        .filter-btn.active-vehicle { background: #aa4a4a; color: #ffffff; border-color: #da7a7a; }

        .filter-btn.filter-family:not(.active-family) { background: #1a3a2a; color: #4a7a6a; }
        .filter-btn.filter-defense:not(.active-defense) { background: #2a2a4a; color: #6a6aaa; }
        .filter-btn.filter-camp:not(.active-camp) { background: #3a2a1a; color: #aa8a5a; }
        .filter-btn.filter-town:not(.active-town) { background: #2a1a3a; color: #8a6aaa; }
        .filter-btn.filter-general:not(.active-general) { background: #2a4a4a; color: #5aaaaa; }
        .filter-btn.filter-vehicle:not(.active-vehicle) { background: #3a1a1a; color: #aa6a6a; }

        .filter-btn:hover:not(.active-all):not(.active-family):not(.active-defense):not(.active-camp):not(.active-town):not(.active-general):not(.active-vehicle) {
            background: #2a3444;
            color: #b9c3db;
        }

        .structure-list {
            max-height: 55vh;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .structure-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1.2rem;
            border-bottom: 1px solid #1f2a36;
            transition: background 0.1s ease;
            cursor: pointer;
        }

        .structure-item.selected {
            background: #243041;
            border-left: 4px solid #e2b13b;
            background: linear-gradient(90deg, #232d3f, #1a212f);
        }

        .structure-item:hover {
            background: #1e2635;
        }

        .structure-icon {
            width: 36px;
            height: 36px;
            background: #1e2937;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .structure-icon img {
            max-width: 32px;
            max-height: 32px;
            object-fit: contain;
        }

        .structure-info {
            flex: 1;
        }

        .structure-name {
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .structure-hp {
            font-size: 0.7rem;
            color: #b9c3db;
            font-family: monospace;
            margin-top: 2px;
        }

        .type-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 0;
            opacity: 0.8;
        }

        .type-badge.family { background: #2a5a3a; color: #a8e6cf; }
        .type-badge.defense { background: #3a3a6a; color: #aaaaff; }
        .type-badge.camp { background: #5a3a2a; color: #ffcc88; }
        .type-badge.town-fortress { background: #4a2a5a; color: #d4a8ff; }
        .type-badge.general { background: #3a5a5a; color: #88dddd; }
        .type-badge.vehicle { background: #5a2a2a; color: #ffaaaa; }

        .calculator-panel {
            flex: 1.2;
            min-width: 280px;
            background: #11161f;
            border-radius: 28px;
            border: 1px solid #293544;
            padding: 1.2rem 1.3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .damage-card {
            background: #0c111a;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #2f3b48;
        }

        .damage-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            border-left: 3px solid #e3b341;
            padding-left: 0.7rem;
        }

        .damage-title img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .damage-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .stat-badge {
            background: #18212e;
            padding: 0.3rem 0.8rem;
            border-radius: 24px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-badge img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .selected-struct {
            background: #0a0f17;
            border-radius: 24px;
            padding: 0.9rem 1rem;
        }

        .selected-name {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .req-list {
            margin-top: 0.7rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .req-item {
            background: #1b2533;
            border-radius: 32px;
            padding: 0.3rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid transparent;
        }

        .req-item:hover {
            background: #2a3a4a;
            border-color: #e2b13b;
        }

        .req-item.selected-damage {
            background: #b87c2e;
            border-color: #ffd966;
            box-shadow: 0 0 4px #ffb347;
        }

        .req-item img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .add-group {
            margin-top: 0.5rem;
            text-align: right;
        }

        .btn {
            background: #2f3e55;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s linear;
            font-size: 0.8rem;
        }

        .btn-primary {
            background: #b87c2e;
            box-shadow: 0 1px 3px black;
        }
        .btn-primary:hover {
            background: #d4912c;
        }

        .clear-btn {
            background: #2a2836;
        }
        .clear-btn:hover {
            background: #3a3446;
        }

        .group-list {
            background: #0c111a;
            border-radius: 24px;
            padding: 0.2rem 0;
            max-height: 280px;
            overflow-y: auto;
        }

        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.9rem;
            border-bottom: 1px solid #21303f;
            font-size: 0.85rem;
        }

        .group-item-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .group-item-name {
            font-weight: 500;
        }

        .group-item-damage {
            font-size: 0.7rem;
            color: #e2b13b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .group-item button {
            background: #3a2a24;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 18px;
            color: #ffbc6e;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .group-totals {
            background: #1b2433;
            border-radius: 20px;
            padding: 0.8rem;
            margin-top: 0.8rem;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-highlight {
            background-color: #ffffaa30;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0c1118;
        }
        ::-webkit-scrollbar-thumb {
            background: #5f6f87;
            border-radius: 6px;
        }
        .patch-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.2rem;
            color: #6a7c94;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .patch-note a {
            color: #d4af6a;
            text-decoration: none;
        }
        .patch-note a:hover {
            text-decoration: underline;
        }
        .total-value {
            font-weight: 600;
            color: #e2b13b;
            font-size: 1.1rem;
        }
        .total-breakdown {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #2a3444;
            font-size: 0.8rem;
        }
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .group-header-section {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-title {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .group-count {
            font-size: 0.75rem;
            color: #8f9bb3;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #8f9bb3;
        }
        .error {
            text-align: center;
            padding: 2rem;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div>
            <h1>⚔️ ANVIL EMPIRES · RAID CALCULATOR</h1>
            <div class="sub"></div>
        </div>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="search structures..." autocomplete="off">
        </div>
    </div>

    <div class="dashboard">
        <div class="structures-panel">
            <div class="panel-header">
                <span>
                    <img src="Icons/IconKeep.png" alt="keep" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%23c68e3a%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M12 2L3 7v10l9 5 9-5V7z%22/%3E%3C/svg%3E'">
                    Structures
                </span>
            </div>
            <div class="filter-bar">
                <button class="filter-btn filter-all active-all" id="filterAllBtn">all</button>
                <button class="filter-btn filter-family" id="filterFamilyBtn">family</button>
                <button class="filter-btn filter-defense" id="filterDefenseBtn">defense</button>
                <button class="filter-btn filter-camp" id="filterCampBtn">camp</button>
                <button class="filter-btn filter-town" id="filterTownBtn">town/fortress</button>
                <button class="filter-btn filter-general" id="filterGeneralBtn">general</button>
                <button class="filter-btn filter-vehicle" id="filterVehicleBtn">vehicle</button>
            </div>
            <div id="structureListContainer" class="structure-list">
                <div class="loading">loading data from datawiki.csv...</div>
            </div>
        </div>

        <div class="calculator-panel">
            <div class="damage-card">
                <div class="damage-title">
                    <img src="Icons/32px-IconDamageTypeSiege.webp" alt="siege" onerror="this.style.display='none'">
                    <span>Damage tools</span>
                </div>
                <div class="damage-stats" id="damageStatsContainer">
                    <div class="loading">loading...</div>
                </div>
            </div>

            <div class="selected-struct" id="selectedPreviewArea">
                <div class="selected-name">
                    <img id="selectedIconPreview" src="Icons/IconTorch.png" width="28" height="28" style="background:#1e2a3a; border-radius:8px; padding:2px;">
                    <span id="selectedStructureName">—</span>
                    <span id="selectedTypeBadge" class="type-badge"></span>
                </div>
                <div id="selectedHpDisplay" style="font-size:0.8rem; margin: 4px 0;">HP: —</div>
                <div class="req-list" id="requiredItemsList"></div>
                <div class="add-group">
                    <button id="addToGroupBtn" class="btn btn-primary">add to planner</button>
                </div>
            </div>

            <div style="margin-top: 8px;">
                <div class="group-header-section">
                    <div class="group-title">Planner</div>
                    <div class="group-count"><span id="groupCount">0</span> objects</div>
                    <button id="clearGroupBtn" class="btn clear-btn">🗑️ clear all</button>
                </div>
                <div id="groupListContainer" class="group-list">
                    <div style="padding: 0.8rem; text-align:center; color:#7f8fa4;">⚔️ group is empty. select an object and click on a damage type, then press add.</div>
                </div>
                <div class="group-totals" id="groupTotalsFooter">
                    <div style="font-weight: bold; margin-bottom: 8px;">Total required</div>
                    <div id="totalSummaryContainer">
                        <div id="damageBreakdown" class="total-breakdown"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="patch-note">
        <span>📅 updated: --</span>
        <span>✍️ author: desharpe</span>
        <span>📚 <a href="https://anvilempires.wiki.gg/" target="_blank">anvilempires.wiki.gg</a></span>
    </div>
</div>

<script>
    let objects = [];
    let damageTypes = {};
    let selectedObjectId = null;
    let selectedDamageTypeForAdd = null;
    let raidGroup = [];
    let activeFilters = new Set(["all"]);
    let csvUpdateDate = "--";

    const searchInput = document.getElementById('searchInput');
    const listContainer = document.getElementById('structureListContainer');
    const damageStatsContainer = document.getElementById('damageStatsContainer');
    const selectedNameSpan = document.getElementById('selectedStructureName');
    const selectedHpSpan = document.getElementById('selectedHpDisplay');
    const selectedTypeBadge = document.getElementById('selectedTypeBadge');
    const requiredItemsList = document.getElementById('requiredItemsList');
    const selectedIconPreview = document.getElementById('selectedIconPreview');
    const addToGroupBtn = document.getElementById('addToGroupBtn');
    const clearGroupBtn = document.getElementById('clearGroupBtn');
    const groupListContainer = document.getElementById('groupListContainer');
    const damageBreakdownDiv = document.getElementById('damageBreakdown');
    const groupCountSpan = document.getElementById('groupCount');
    const patchNoteDate = document.querySelector('.patch-note span:first-child');

    const filterAllBtn = document.getElementById('filterAllBtn');
    const filterFamilyBtn = document.getElementById('filterFamilyBtn');
    const filterDefenseBtn = document.getElementById('filterDefenseBtn');
    const filterCampBtn = document.getElementById('filterCampBtn');
    const filterTownBtn = document.getElementById('filterTownBtn');
    const filterGeneralBtn = document.getElementById('filterGeneralBtn');
    const filterVehicleBtn = document.getElementById('filterVehicleBtn');

    // Все допустимые типы объектов для осадных орудий
    const ALL_STRUCTURE_TYPES = ["family", "defense", "camp", "town", "general"];

    function parseCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        let objectsList = [];
        let damageMap = {};
        let currentSection = null;
        let updatedDate = null;

        for (let line of lines) {
            line = line.trim();
            if (line === "") continue;

            if (line.startsWith("Updated:")) {
                updatedDate = line.replace("Updated:", "").trim();
                csvUpdateDate = updatedDate;
                if (patchNoteDate) patchNoteDate.innerText = `📅 updated: ${updatedDate}`;
                continue;
            }

            if (line === "#Structure" || line.startsWith("#Structure")) {
                currentSection = "structures";
                continue;
            }
            if (line === "#Damage" || line.startsWith("#Damage")) {
                currentSection = "damage";
                continue;
            }

            if (line.startsWith("#") || line.startsWith("//")) continue;

            if (currentSection === "structures") {
                const colonIndex = line.indexOf(":");
                if (colonIndex === -1) continue;
                const name = line.substring(0, colonIndex).trim();
                const rest = line.substring(colonIndex + 1).trim();
                const parts = rest.split(",");
                const hp = parseInt(parts[0]);
                let category = parts.length > 1 ? parts[1].trim() : "general";
                // normalise category
                let normalizedCategory = category;
                let displayType = category;
                if (category === "town/fortress") {
                    normalizedCategory = "town";
                    displayType = "town/fortress";
                }
                if (!isNaN(hp)) {
                    objectsList.push({
                        name: name,
                        hp: hp,
                        type: displayType,
                        category: normalizedCategory,
                        durability: "durable"
                    });
                }
            }
            else if (currentSection === "damage") {
                const colonIndex = line.indexOf(":");
                if (colonIndex === -1) continue;
                const name = line.substring(0, colonIndex).trim();
                const rest = line.substring(colonIndex + 1).trim();
                const parts = rest.split(",");
                const damageRange = parts[0];
                const durabilityType = parts.length > 1 ? parts[1].trim() : "consumable";

                let min, max;
                if (damageRange.includes("-")) {
                    const [minStr, maxStr] = damageRange.split("-");
                    min = parseInt(minStr);
                    max = parseInt(maxStr);
                } else {
                    min = max = parseInt(damageRange);
                }

                if (!isNaN(min) && !isNaN(max)) {
                    let key = name.toLowerCase().replace(/\s+/g, '');
                    if (key === "ironbroadax") key = "broadax";
                    if (key === "batteringram") key = "batteringram";
                    if (key === "heavybatteringram") key = "heavyram";

                    let allowedFor = [...ALL_STRUCTURE_TYPES, "vehicle"]; // torch and oil for all

                    if (name === "Iron Broadax") {
                        allowedFor = ["vehicle"];
                    } else if (name === "Battering Ram" || name === "Heavy Battering Ram" || name === "Catapult") {
                        allowedFor = [...ALL_STRUCTURE_TYPES]; // все типы построек, НЕ vehicle
                    } else {
                        allowedFor = [...ALL_STRUCTURE_TYPES, "vehicle"];
                    }

                    damageMap[key] = {
                        min: min, max: max, name: name,
                        icon: getDamageIcon(name),
                        allowedFor: allowedFor,
                        durable: durabilityType === "durable"
                    };
                }
            }
        }
        return { objects: objectsList, damage: damageMap };
    }

    function getDamageIcon(damageName) {
        const name = damageName.toLowerCase();
        if (name.includes("torch")) return "Icons/IconTorch.png";
        if (name.includes("oil")) return "Icons/IconOilFlask.png";
        if (name.includes("broadax")) return "Icons/IconCombatAxe.png";
        if (name.includes("battering ram") && !name.includes("heavy")) return "Icons/BatteringRamIcon.png";
        if (name.includes("heavy battering ram")) return "Icons/HeavyBatteringRamIcon.png";
        if (name.includes("catapult")) return "Icons/CatapultIcon.png";
        return "Icons/IconTorch.png";
    }

    function loadDataFromCSV() {
        return fetch('datawiki.csv')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.text();
            })
            .then(csvText => {
                const parsed = parseCSV(csvText);
                objects = parsed.objects.map((obj, idx) => ({ ...obj, id: `obj_${idx}` }));
                damageTypes = parsed.damage;
                selectedDamageTypeForAdd = Object.keys(damageTypes)[0] || "torch";
                selectedObjectId = objects[0]?.id || null;
                return true;
            })
            .catch(error => {
                console.error('Error loading datawiki.csv:', error);
                listContainer.innerHTML = `<div class="error">⚠️ failed to load datawiki.csv. make sure the file exists next to this page.</div>`;
                damageStatsContainer.innerHTML = `<div class="error">⚠️ failed to load damage data.</div>`;
                return false;
            });
    }

    function getDamageRange(hp, damageTypeKey, objectType) {
        const dmg = damageTypes[damageTypeKey];
        if (!dmg) return { min: 0, max: 0 };
        if (!dmg.allowedFor.includes(objectType)) return { min: 0, max: 0 };
        const minHits = Math.ceil(hp / dmg.max);
        const maxHits = Math.ceil(hp / dmg.min);
        return { min: minHits, max: maxHits };
    }

    function formatRange(range) {
        if (range.min === range.max) return `${range.min}`;
        return `${range.min}–${range.max}`;
    }

    function getIconForObject(name) {
        const lowerName = name.toLowerCase();
        if (lowerName.includes("keystone")) return "Icons/FamilyCenterKeystoneIcon.png";
        if (lowerName.includes("homestead square wall")) return "Icons/FamilyCenterWallSquareIcon.png";
        if (lowerName.includes("homestead square bedrock")) return "Icons/FamilyCenterFoundationSquareIcon.png";
        if (lowerName.includes("makeshift wall")) return "Icons/IconWall.png";
        if (lowerName.includes("large camp")) return "Icons/IconCamp.png";
        if (lowerName.includes("camp palisade")) return "Icons/IconCampWall.png";
        if (lowerName.includes("stockade")) return "Icons/IconCampStockade.png";
        if (lowerName.includes("small camp")) return "Icons/IconCamp.png";
        if (lowerName.includes("beacon tower")) return "Icons/IconBeaconTower.png";
        if (lowerName.includes("fortress keep")) return "Icons/IconKeep.png";
        if (lowerName.includes("town center")) return "Icons/IconTownhall.png";
        if (lowerName.includes("kepp/town wall")) return "Icons/IconGridFoundation_gate.png";
        if (lowerName.includes("siege tower")) return "Icons/SiegeTowerIcon.png";
        if (lowerName.includes("heavy battering ram")) return "Icons/HeavyBatteringRamIcon.png";
        if (lowerName.includes("battering ram")) return "Icons/BatteringRamIcon.png";
        if (lowerName.includes("catapult")) return "Icons/CatapultIcon.png";
        if (lowerName.includes("keep door hold wall")) return "Icons/IconGridFoundation_wall_Door.png";
        if (lowerName.includes("temple")) return "Icons/IconTemple.png";
        if (lowerName.includes("resource stockpile")) return "Icons/IconResourceStockpile.png";
        if (lowerName.includes("homestead corridor")) return "Icons/FamilyCenterCorridorIcon.png";
        if (lowerName.includes("homestead bridge walkway")) return "Icons/FamilyCenterWalkwayIcon.png";
        if (lowerName.includes("caravan")) return "Icons/CaravanIcon.png";
        if (lowerName.includes("resource wagon")) return "Icons/WagonIcon.png";
        if (lowerName.includes("small boat")) return "Icons/BoatSmallIcon.png";
        if (lowerName.includes("hand cart")) return "Icons/CartIcon.png";
        if (lowerName.includes("scorpion")) return "Icons/IconScorpion.png";
        if (lowerName.includes("siege ladder")) return "Icons/IconSiegeLadder.png";
        if (lowerName.includes("keep triangular foundation")) return "Icons/IconGridFoundation_triangular.png";
        if (lowerName.includes("keep half width foundation")) return "Icons/IconGridFoundation_squareHalf.png";
        if (lowerName.includes("hen house")) return "Icons/IconHenhouse.png";
        if (lowerName.includes("drying rack")) return "Icons/IconTannery.png";
        if (lowerName.includes("stable")) return "Icons/IconSmallBarn.png";
        if (lowerName.includes("tilled field")) return "Icons/IconFarm.png";
        if (lowerName.includes("shallow well")) return "Icons/IconWell.png";
        return "Icons/IconWall.png";
    }

    function getAvailableDamageTypes(objType) {
        const available = [];
        for (const [key, dmg] of Object.entries(damageTypes)) {
            if (dmg.allowedFor.includes(objType)) available.push(key);
        }
        return available;
    }

    function updateDamageToolsDisplay() {
        let html = '';
        for (const [key, dmg] of Object.entries(damageTypes)) {
            const rangeStr = (dmg.min === dmg.max) ? `${dmg.min}` : `${dmg.min}–${dmg.max}`;
            html += `<div class="stat-badge"><img src="${dmg.icon}" onerror="this.style.display='none'"> ${dmg.name}: ${rangeStr}</div>`;
        }
        damageStatsContainer.innerHTML = html;
    }

    function updateSelectedDisplay() {
        const obj = objects.find(o => o.id === selectedObjectId);
        if (obj) {
            selectedNameSpan.innerText = obj.name;
            selectedHpSpan.innerText = `❤️ HP: ${obj.hp}`;
            const displayType = obj.category === 'town' ? 'town/fortress' : obj.category;
            selectedTypeBadge.innerText = displayType;
            selectedTypeBadge.className = `type-badge ${obj.category === 'town' ? 'town-fortress' : obj.category}`;

            const available = getAvailableDamageTypes(obj.category);
            let html = "";
            for (let dmgKey of available) {
                const dmg = damageTypes[dmgKey];
                const range = getDamageRange(obj.hp, dmgKey, obj.category);
                const isSelected = (selectedDamageTypeForAdd === dmgKey);
                html += `<div class="req-item ${isSelected ? 'selected-damage' : ''}" data-damage-type="${dmgKey}">
                            <img src="${dmg.icon}" onerror="this.style.display='none'"> ${dmg.name}: ${formatRange(range)}
                         </div>`;
            }
            requiredItemsList.innerHTML = html;
            selectedIconPreview.src = getIconForObject(obj.name);

            document.querySelectorAll('.req-item[data-damage-type]').forEach(el => {
                el.addEventListener('click', (e) => {
                    selectedDamageTypeForAdd = el.getAttribute('data-damage-type');
                    updateSelectedDisplay();
                });
            });
        }
    }

    function renderObjectList() {
        const query = searchInput.value.trim().toLowerCase();
        let filtered = objects;

        if (!activeFilters.has("all") && activeFilters.size > 0) {
            filtered = filtered.filter(obj => activeFilters.has(obj.category));
        }

        if (query) {
            filtered = filtered.filter(o => o.name.toLowerCase().includes(query));
        }

        if (filtered.length === 0) {
            listContainer.innerHTML = `<div style="padding: 1.5rem; text-align:center;">🔎 no matches</div>`;
            return;
        }

        listContainer.innerHTML = filtered.map(obj => {
            const isSelected = (selectedObjectId === obj.id);
            const displayType = obj.category === 'town' ? 'town/fortress' : obj.category;
            const typeClass = obj.category === 'town' ? 'town-fortress' : obj.category;
            return `<div class="structure-item ${isSelected ? 'selected' : ''}" data-id="${obj.id}">
                        <div class="structure-icon"><img src="${getIconForObject(obj.name)}" onerror="this.src='Icons/IconWall.png'"></div>
                        <div class="structure-info">
                            <div class="structure-name">
                                ${escapeHtml(obj.name)}
                                <span class="type-badge ${typeClass}">${displayType}</span>
                            </div>
                            <div class="structure-hp">❤️ HP: ${obj.hp}</div>
                        </div>
                    </div>`;
        }).join('');

        document.querySelectorAll('.structure-item').forEach(el => {
            el.addEventListener('click', (e) => {
                selectedObjectId = el.getAttribute('data-id');
                const obj = objects.find(o => o.id === selectedObjectId);
                if (obj) {
                    const available = getAvailableDamageTypes(obj.category);
                    if (available.length && !available.includes(selectedDamageTypeForAdd)) {
                        selectedDamageTypeForAdd = available[0];
                    }
                }
                updateSelectedDisplay();
                renderObjectList();
                e.stopPropagation();
            });
        });
    }

    function updateGroupUI() {
        groupCountSpan.innerText = raidGroup.length;
        if (raidGroup.length === 0) {
            groupListContainer.innerHTML = `<div style="padding: 0.8rem; text-align:center; color:#7f8fa4;">⚔️ group is empty. add objects.</div>`;
            damageBreakdownDiv.innerHTML = '<div style="color:#8f9bb3;">—</div>';
            return;
        }

        let totals = {};
        for (let [key, dmg] of Object.entries(damageTypes)) {
            totals[key] = { min: 0, max: 0, name: dmg.name, icon: dmg.icon, durable: dmg.durable };
        }

        const groupHtml = raidGroup.map((item, idx) => {
            totals[item.damageType].min += item.hitsMin;
            totals[item.damageType].max += item.hitsMax;
            const dmg = damageTypes[item.damageType];
            const rangeStr = (item.hitsMin === item.hitsMax) ? `${item.hitsMin}` : `${item.hitsMin}–${item.hitsMax}`;
            const hitsWord = (dmg.durable) ? " hits" : "";
            const displayType = item.category === 'town' ? 'town/fortress' : item.category;
            const typeClass = item.category === 'town' ? 'town-fortress' : item.category;
            return `<div class="group-item">
                        <div class="group-item-info">
                            <div class="group-item-name"><img src="${getIconForObject(item.name)}" width="20" height="20" style="vertical-align:middle; margin-right:6px;"> <strong>${escapeHtml(item.name)}</strong> <span class="type-badge ${typeClass}">${displayType}</span></div>
                            <div class="group-item-damage"><img src="${dmg.icon}" style="width:14px;height:14px;"> ${dmg.name}: ${rangeStr}${hitsWord}</div>
                        </div>
                        <button class="remove-group-item" data-index="${idx}">✖</button>
                    </div>`;
        }).join('');
        groupListContainer.innerHTML = groupHtml;

        let breakdownHtml = '';
        for (let [key, data] of Object.entries(totals)) {
            if (data.min > 0 || data.max > 0) {
                const rangeStr = (data.min === data.max) ? `${data.min}` : `${data.min}–${data.max}`;
                const hitsWord = (data.durable) ? " hits" : "";
                breakdownHtml += `<div class="breakdown-item"><span><img src="${data.icon}" style="width:16px;height:16px;margin-right:6px;"> ${data.name}:</span><span class="total-value" style="font-size:0.9rem;">${rangeStr}${hitsWord}</span></div>`;
            }
        }
        damageBreakdownDiv.innerHTML = breakdownHtml || '<div style="color:#8f9bb3;">—</div>';

        document.querySelectorAll('.remove-group-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                raidGroup.splice(parseInt(btn.getAttribute('data-index')), 1);
                updateGroupUI();
                e.stopPropagation();
            });
        });
    }

    function addSelectedToGroup() {
        const obj = objects.find(o => o.id === selectedObjectId);
        if (!obj) { alert("select an object first"); return; }
        if (!selectedDamageTypeForAdd || !damageTypes[selectedDamageTypeForAdd]) {
            alert("select a damage type first");
            return;
        }
        const available = getAvailableDamageTypes(obj.category);
        if (!available.includes(selectedDamageTypeForAdd)) {
            alert(`${damageTypes[selectedDamageTypeForAdd]?.name} cannot damage ${obj.type}s!`);
            return;
        }
        const range = getDamageRange(obj.hp, selectedDamageTypeForAdd, obj.category);
        raidGroup.push({
            id: Date.now() + Math.random(),
            name: obj.name,
            hp: obj.hp,
            type: obj.type,
            category: obj.category,
            durability: obj.durability,
            damageType: selectedDamageTypeForAdd,
            hitsMin: range.min,
            hitsMax: range.max
        });
        updateGroupUI();
    }

    function clearGroup() {
        raidGroup = [];
        updateGroupUI();
    }

    function updateFilterButtons() {
        if (activeFilters.has("all")) {
            filterAllBtn.classList.add('active-all');
            filterAllBtn.classList.remove('filter-all');
            [filterFamilyBtn, filterDefenseBtn, filterCampBtn, filterTownBtn, filterGeneralBtn, filterVehicleBtn].forEach(btn => {
                btn.classList.remove('active-family', 'active-defense', 'active-camp', 'active-town', 'active-general', 'active-vehicle');
            });
        } else {
            filterAllBtn.classList.remove('active-all');
            filterAllBtn.classList.add('filter-all');

            const filterMap = {
                family: filterFamilyBtn, defense: filterDefenseBtn, camp: filterCampBtn,
                town: filterTownBtn, general: filterGeneralBtn, vehicle: filterVehicleBtn
            };

            for (const [category, btn] of Object.entries(filterMap)) {
                if (activeFilters.has(category)) {
                    btn.classList.add(`active-${category}`);
                } else {
                    btn.classList.remove(`active-${category}`);
                }
            }
        }
    }

    function toggleFilter(filter) {
        if (filter === "all") {
            activeFilters.clear();
            activeFilters.add("all");
        } else {
            if (activeFilters.has("all")) {
                activeFilters.delete("all");
            }
            if (activeFilters.has(filter)) {
                activeFilters.delete(filter);
                if (activeFilters.size === 0) {
                    activeFilters.add("all");
                }
            } else {
                activeFilters.add(filter);
            }
        }
        updateFilterButtons();
        renderObjectList();
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }

    async function initialize() {
        const loaded = await loadDataFromCSV();
        if (!loaded) return;

        updateDamageToolsDisplay();
        renderObjectList();
        if (objects.length) {
            selectedObjectId = objects[0].id;
            const available = getAvailableDamageTypes(objects[0].category);
            if (available.length) selectedDamageTypeForAdd = available[0];
            updateSelectedDisplay();
        }
        
        addToGroupBtn.onclick = addSelectedToGroup;
        clearGroupBtn.onclick = clearGroup;
        searchInput.oninput = () => renderObjectList();
        
        filterAllBtn.onclick = () => toggleFilter("all");
        filterFamilyBtn.onclick = () => toggleFilter("family");
        filterDefenseBtn.onclick = () => toggleFilter("defense");
        filterCampBtn.onclick = () => toggleFilter("camp");
        filterTownBtn.onclick = () => toggleFilter("town");
        filterGeneralBtn.onclick = () => toggleFilter("general");
        filterVehicleBtn.onclick = () => toggleFilter("vehicle");
        
        updateGroupUI();
        updateFilterButtons();
    }
    
    initialize();
</script>
</body>
</html>
